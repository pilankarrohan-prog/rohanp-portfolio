<section class="certifications-section" id="certifications" [class.revealed]="isRevealed()">
    <div class="glow-container">
        <div class="certs-glow"></div>
    </div>
    
    <div class="section-header">
        <div class="cyber-subtitle">CREDENTIALS & TRAINING</div>
        <h2 class="section-title">Verified Certifications</h2>
        <div class="section-line"></div>
    </div>

    <!-- Category Filters -->
    <div class="filter-container">
        <button 
            *ngFor="let cat of getCategories()" 
            class="filter-chip" 
            [class.active]="selectedCategory() === cat"
            (click)="selectCategory(cat)">
            {{ cat }}
        </button>
    </div>

    <!-- Certifications Grid -->
    <div class="certs-grid">
        <div class="cert-card" *ngFor="let cert of filteredCertifications()">
            <div class="cert-preview-container" (click)="openLightbox(cert.previewUrl)">
                <img [src]="cert.previewUrl" [alt]="cert.title" class="cert-preview-img" loading="lazy">
                <div class="cert-preview-overlay">
                    <span class="preview-btn">
                        <svg class="icon"><use href="#icon-play"/></svg>
                        Quick View
                    </span>
                </div>
                <span class="cert-tag">{{ cert.category }}</span>
            </div>

            <div class="cert-info">
                <h3 class="cert-title" [title]="cert.title">{{ cert.title }}</h3>
                <p class="cert-issuer">
                    <svg class="icon-small"><use href="#icon-edu"/></svg>
                    {{ cert.issuer }}
                </p>
                <div class="cert-footer">
                    <span class="cert-date">{{ cert.date }}</span>
                    <div class="cert-actions">
                        <button (click)="openLightbox(cert.previewUrl)" class="btn btn-card-action view-btn" title="View Preview Image">
                            <svg class="icon"><use href="#icon-play"/></svg>
                            View
                        </button>
                        <a [href]="cert.pdfUrl" [download]="cert.title + '.pdf'" class="btn btn-card-action download-btn" title="Download Certificate PDF">
                            <svg class="icon"><use href="#icon-download"/></svg>
                            PDF
                        </a>
                    </div>
                </div>
            </div>
            <!-- Tech corner decorations -->
            <span class="corner-t-l"></span>
            <span class="corner-t-r"></span>
            <span class="corner-b-l"></span>
            <span class="corner-b-r"></span>
        </div>
    </div>

    <!-- Interactive Lightbox Modal -->
    <div class="lightbox-overlay" *ngIf="activeLightboxUrl()" (click)="closeLightbox()">
        <div class="lightbox-card" (click)="$event.stopPropagation()">
            <div class="lightbox-header">
                <span class="lightbox-title">// CREDENTIAL_SECURE_IMAGE</span>
                <button class="lightbox-close" (click)="closeLightbox()">&times;</button>
            </div>
            <div class="lightbox-body">
                <img [src]="activeLightboxUrl()" alt="Certificate High-Res Preview" class="lightbox-img">
            </div>
        </div>
    </div>
</section>
