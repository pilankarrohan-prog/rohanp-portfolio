<section class="achievements-section scroll-reveal" id="achievements" [class.revealed]="isRevealed()">
    <div class="container">
        <div class="section-header">
            <div class="cyber-subtitle">SYSTEM MILESTONES</div>
            <h2 class="section-title">Key Achievements</h2>
            <div class="section-line"></div>
        </div>
        
        <div class="achievements-grid">
            @for (ach of achievements(); track ach.title) {
                <div class="achievement-card glass-card hover-glow" #achCard (mousemove)="onMouseMove($event, achCard)">
                    <div class="card-glow"></div>
                    <div class="ach-header">
                        <div class="ach-icon-container">
                            <svg class="icon ach-icon"><use [attr.href]="'#' + ach.icon"/></svg>
                        </div>
                        @if (ach.badge) {
                            <span class="ach-badge">{{ ach.badge }}</span>
                        }
                    </div>
                    <div class="ach-body">
                        <h3>{{ ach.title }}</h3>
                        <p>{{ ach.description }}</p>
                    </div>
                    <!-- Tech corner decorations -->
                    <span class="corner-t-l"></span>
                    <span class="corner-b-r"></span>
                </div>
            }
        </div>
    </div>
</section>
