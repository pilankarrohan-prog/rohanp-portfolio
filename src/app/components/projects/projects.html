<section class="projects-section scroll-reveal" id="projects" [class.revealed]="isRevealed()">
    <div class="container">
        <div class="projects-header">
            <h2 class="section-title text-glitch" data-text="// DEPLOYED_PROJECTS">// DEPLOYED_PROJECTS</h2>
        </div>
        
        <div class="projects-grid">
            
            @for (project of projects(); track project.title) {
                <div class="project-card glass-card hover-glow" #projectCard (mousemove)="onMouseMove($event, projectCard)">
                    <div class="card-glow"></div>
                    <div class="project-image-wrapper">
                        @if (project.isFeatured) {
                            <div class="featured-badge">Featured Project</div>
                        }
                        <img [src]="project.imageUrl" [alt]="project.title + ' Screenshot'" class="project-img">
                        <div class="project-overlay">
                            <div class="tech-tags">
                                @for (tag of project.tags; track tag) {
                                    <span class="tag">{{ tag }}</span>
                                }
                            </div>
                        </div>
                    </div>
                    <div class="project-content">
                        <h3>{{ project.title }}</h3>
                        <p>{{ project.description }}</p>
                        <div class="project-links">
                            <a [href]="project.githubUrl" target="_blank" rel="noopener" class="btn btn-card-link">
                                <svg class="icon link-icon"><use href="#icon-github"/></svg>
                                Code
                            </a>
                            <a [href]="project.demoUrl" target="_blank" rel="noopener" class="btn btn-card-link live-demo-btn">
                                <svg class="icon link-icon"><use href="#icon-play"/></svg>
                                Live Demo
                            </a>
                        </div>
                    </div>
                </div>
            }

        </div>
    </div>
</section>
