<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#b100ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#020205" stroke="url(#neonGlow)" stroke-width="2"/>
  <!-- AI Chip pattern lines -->
  <path d="M 10 30 L 25 30 M 10 70 L 25 70 M 90 30 L 75 30 M 90 70 L 75 70 M 30 10 L 30 25 M 70 10 L 70 25 M 30 90 L 30 75 M 70 90 L 70 75" stroke="url(#neonGlow)" stroke-width="1.5" opacity="0.6"/>
  <!-- Central Ring -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#neonGlow)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Initials RP -->
  <text x="50" y="58" font-family="'Orbitron', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">RP</text>
</svg>
