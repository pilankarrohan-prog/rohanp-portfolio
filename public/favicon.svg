<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120c1f" />
      <stop offset="100%" stop-color="#05030a" />
    </radialGradient>
    
    <!-- Neon Blue Gradient -->
    <linearGradient id="blue-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Neon Purple Gradient -->
    <linearGradient id="purple-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d000ff" />
      <stop offset="100%" stop-color="#7B00FF" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Subtle Background Grid/Nodes -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#251a4a" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#251a4a" stroke-width="4"/>
  <rect width="512" height="512" rx="128" fill="url(#grid)"/>

  <!-- AI Brain / Network Nodes Motif (Subtle in background) -->
  <g opacity="0.4">
    <!-- Connecting network lines -->
    <path d="M 120 180 L 256 100 L 392 180 L 392 332 L 256 412 L 120 332 Z" fill="none" stroke="url(#blue-neon)" stroke-width="2" stroke-dasharray="5 5"/>
    <path d="M 160 200 L 256 150 L 352 200 L 352 312 L 256 362 L 160 312 Z" fill="none" stroke="url(#purple-neon)" stroke-width="1.5"/>
    
    <!-- Nodes -->
    <circle cx="256" cy="100" r="6" fill="#00f0ff" filter="url(#glow-blue)"/>
    <circle cx="120" cy="180" r="6" fill="#d000ff" filter="url(#glow-purple)"/>
    <circle cx="392" cy="180" r="6" fill="#d000ff" filter="url(#glow-purple)"/>
    <circle cx="120" cy="332" r="6" fill="#00f0ff" filter="url(#glow-blue)"/>
    <circle cx="392" cy="332" r="6" fill="#00f0ff" filter="url(#glow-blue)"/>
    <circle cx="256" cy="412" r="6" fill="#d000ff" filter="url(#glow-purple)"/>
  </g>

  <!-- Futuristic Hexagon Border (Neon) -->
  <polygon points="256,40 440,146 440,366 256,472 72,366 72,146" fill="none" stroke="url(#blue-neon)" stroke-width="6" filter="url(#glow-blue)" opacity="0.8"/>
  <polygon points="256,52 428,152 428,360 256,460 84,360 84,152" fill="none" stroke="url(#purple-neon)" stroke-width="3" filter="url(#glow-purple)" opacity="0.6"/>

  <!-- Stylized Monogram RP -->
  <g transform="translate(10, 0)">
    <!-- Letter R -->
    <path d="M 150 160 L 230 160 C 270 160, 270 230, 230 230 L 150 230 M 150 200 L 220 200 M 150 230 L 150 360 M 210 230 L 265 360" 
          fill="none" stroke="url(#blue-neon)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-blue)"/>
    
    <!-- Letter P -->
    <path d="M 280 360 L 280 160 L 350 160 C 390 160, 390 240, 350 240 L 280 240" 
          fill="none" stroke="url(#purple-neon)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-purple)"/>
  </g>

  <!-- Central Data/AI Node Core -->
  <circle cx="256" cy="256" r="12" fill="#ffffff" filter="url(#glow-blue)"/>
  <circle cx="256" cy="256" r="6" fill="#00f0ff"/>
</svg>
